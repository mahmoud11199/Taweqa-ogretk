<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقع أجرتك - العداد الذكي المتعدد المطور</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
            --primary: #22d3ee; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --glass: rgba(30, 41, 59, 0.7); --border: rgba(148, 163, 184, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); padding: 12px; color: var(--text); min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 60px; }
        
        .tabs { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 15px; margin-bottom: 16px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--muted); font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .tab-btn.active { background: var(--primary); color: var(--bg); }

        .app-section { display: none; }
        .app-section.active { display: block; }

        .header { text-align: center; margin-bottom: 16px; }
        .header h1 { font-size: 24px; font-weight: 900; background: linear-gradient(90deg, var(--primary), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--muted); font-size: 12px; }
        
        .card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 20px; padding: 16px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        
        .meter-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .meter-tab { padding: 10px; background: #334155; text-align: center; border-radius: 10px; font-weight: 700; cursor: pointer; border: 2px solid transparent; }
        .meter-tab.active { border-color: var(--primary); background: rgba(34, 211, 238, 0.1); color: var(--primary); }
        .meter-status-dot { display: inline-block; width: 8px; height: 8px; background: var(--muted); border-radius: 50%; margin-left: 6px; }
        .meter-status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }

        .main-meter { text-align: center; position: relative; }
        .fare-display { font-size: 44px; font-weight: 900; font-family: monospace; color: var(--primary); text-shadow: 0 0 20px rgba(34, 211, 238, 0.5); margin: 6px 0; }
        .trip-type-badge { display: inline-block; background: var(--primary); color: var(--bg); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .waiting-badge { display: inline-block; background: var(--warning); color: var(--bg); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-right: 6px; display: none;}
        .passengers-badge { display: inline-block; background: #818cf8; color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-right: 6px; }

        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; margin-top: 10px;}
        .stat-box h3 { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 2px; }
        .stat-box .value { font-size: 16px; font-weight: 700; color: var(--text); }
        
        .form-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .form-row label { font-weight: 600; font-size: 13px; }
        .form-row input, .form-row select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; width: 110px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 13px;}
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center;}
        .btn:active { transform: scale(0.97); }
        .btn-start { background: var(--success); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-dynamic { background: var(--warning); color: var(--bg); grid-column: span 2; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        
        #map { height: 220px; border-radius: 16px; border: 1px solid var(--border); z-index: 1; }
        
        .history-item { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 12px; margin-bottom: 10px; position: relative;}
        .history-header { display: flex; justify-content: space-between; font-weight: 700; border-bottom: 1px dashed var(--border); padding-bottom: 6px; margin-bottom: 8px; font-size: 13px;}
        .history-details { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; color: var(--muted); }
        .history-fare { color: var(--primary); font-weight: 900; font-size: 16px; text-align: left;}

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; padding: 16px; backdrop-filter: blur(5px); }
        .receipt { background: var(--card); width: 100%; max-width: 420px; border-radius: 20px; padding: 0; overflow: hidden; border: 1px solid var(--border); }
        .receipt-header { background: linear-gradient(135deg, var(--primary), #818cf8); padding: 16px; text-align: center; }
        .receipt-header h2 { font-size: 18px; font-weight: 900; color: var(--bg); }
        .receipt-body { padding: 16px; }
        .receipt-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
        .receipt-line .label { color: var(--muted); }
        .receipt-line .value { font-weight: 700; }
        .receipt-divider { border-top: 1px dashed var(--border); margin: 12px 0; }
        .receipt-total { font-size: 18px; font-weight: 900; color: var(--primary); }
        .receipt-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 16px; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 10px 18px; border-radius: 12px; font-weight: 700; z-index: 1000; display: none; font-size: 13px;}
        .empty-state { text-align: center; color: var(--muted); padding: 30px 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchSection('meter-section', this)">📟 العدادات الذكية</button>
        <button class="tab-btn" onclick="switchSection('history-section', this); renderHistory();">📜 سجل الرحلات</button>
    </div>

    <!-- SECTION 1: METERS -->
    <div id="meter-section" class="app-section active">
        <div class="header">
            <h1>توقع أجرتك الذكي Pro</h1>
            <p id="globalStatusText">تتبع حي للمسار ونظام ركاب ديناميكي مرن</p>
        </div>

        <div class="meter-selector">
            <div id="meterTab_1" class="meter-tab active" onclick="switchActiveMeterUI(1)">
                <span id="dot_1" class="meter-status-dot"></span>عداد 1 (أساسي)
            </div>
            <div id="meterTab_2" class="meter-tab" onclick="switchActiveMeterUI(2)">
                <span id="dot_2" class="meter-status-dot"></span>عداد 2 (إضافي)
            </div>
        </div>
        
        <div class="card" id="setupSection">
            <div class="form-row">
                <label>نوع الرحلة الكلي:</label>
                <select id="tripType" onchange="onTripTypeChanged()">
                    <option value="makhsoos">مخصوص</option>
                    <option value="afrad">أفراد (خط/مشترك)</option>
                </select>
            </div>
            <div class="form-row" id="kmPriceGroup">
                <label>سعر الكيلو (جنية):</label>
                <input type="number" id="kmPriceInput" value="5" min="1" max="50">
            </div>
            <div class="form-row">
                <label>دقيقة الانتظار (جنية):</label>
                <input type="number" id="waitPriceInput" value="1" min="0" max="20">
            </div>
            <div class="form-row">
                <label>دقيقة الوقت الكلي (جنية):</label>
                <input type="number" id="durationPriceInput" value="0.50" step="0.10" min="0" max="10">
            </div>
        </div>

        <div class="card main-meter">
            <div class="trip-type-badge" id="currentTypeDisplay">-</div>
            <div class="passengers-badge" id="passengersBadge">👥 ركاب: 1</div>
            <div class="waiting-badge" id="waitingBadge">وضع انتظار ⏳</div>
            <div class="fare-display" id="totalFareDisplay">0.00 ج</div>
            <div class="stats">
                <div class="stat-box"><h3>المسافة</h3><div class="value"><span id="distDisplay">0.00</span> كم</div></div>
                <div class="stat-box"><h3>الزمن الكلي</h3><div class="value"><span id="durationDisplay">0</span> د</div></div>
                <div class="stat-box"><h3>الانتظار</h3><div class="value"><span id="waitDisplay">0</span> د</div></div>
            </div>
        </div>

        <div class="card">
            <div class="btn-grid">
                <button class="btn btn-start" id="startBtn" onclick="startCurrentMeter()">بدء العداد</button>
                <button class="btn btn-stop" id="stopBtn" onclick="stopCurrentMeter()" disabled>إنهاء وتصفية</button>
                
                <!-- زر التحكم الديناميكي الذكي المحدث -->
                <button class="btn btn-dynamic" id="dynamicActionBtn" onclick="handleDynamicActionButton()" disabled>⚙️ إجراء على الركاب</button>
                
                <button class="btn btn-secondary" onclick="triggerManualDistance()">📡 GPS ضعيف (يدوي)</button>
                <button class="btn btn-secondary" style="background-color: #ef444415; color: var(--danger);" onclick="resetCurrentMeterData()">تصفير العداد الحالي</button>
            </div>
        </div>

        <div class="card">
            <div id="map"></div>
        </div>
    </div>

    <!-- SECTION 2: HISTORY -->
    <div id="history-section" class="app-section">
        <div class="header">
            <h1>سجل الرحلات المحفوظة</h1>
            <p>إحصائيات الرحلات المخزنة محلياً على الهاتف</p>
        </div>
        <div class="card">
            <button class="btn btn-stop" style="width:100%; margin-bottom:15px;" onclick="clearAllHistory()">🗑️ مسح السجل بالكامل</button>
            <div id="historyList"></div>
        </div>
    </div>
</div>

<div class="modal" id="receiptModal">
    <div class="receipt">
        <div class="receipt-header"><h2>🧾 فاتورة رحلة مصفاة</h2></div>
        <div class="receipt-body" id="receiptBody"></div>
        <div class="receipt-actions">
            <button class="btn btn-secondary" onclick="shareWhatsApp()">واتساب</button>
            <button class="btn btn-start" onclick="closeReceipt()">إغلاق</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const GPS_FILTER = { minDistance: 0.015, waitingSpeedKmh: 4.0 };

    let meters = {
        1: createEmptyMeterObject(1),
        2: createEmptyMeterObject(2)
    };
    
    let activeMeterId = 1; 
    let map, pathLine, currentMarker;
    let globalWatchId = null;

    function createEmptyMeterObject(id) {
        return {
            id: id,
            isActive: false,
            tripType: 'makhsoos',
            kmPrice: 5,
            waitPrice: 1,
            durationPrice: 0.50, 
            bandira: 5,
            minFare: 10,
            totalDistance: 0,
            startTime: null,
            totalDurationMinutes: 0,
            totalWaitSeconds: 0,
            lastLat: null, lastLng: null, lastLocationTime: null,
            isWaitingMode: false,
            shareCode: '',
            finalFare: 0,
            passengerCount: 1, // عدد الركاب الافتراضي هو 1 عند البداية
            pathCoords: [] 
        };
    }

    window.onload = () => {
        initMap();
        loadDataFromStorage();
        initGlobalGPS();
        switchActiveMeterUI(1);
        updateDotsUI();
    };

    function initMap() {
        map = L.map('map').setView([30.0444, 31.2357], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        pathLine = L.polyline([], {color: '#22d3ee', weight: 5}).addTo(map);
        currentMarker = L.marker([30.0444, 31.2357]).addTo(map);
    }

    function switchSection(sectionId, btn) {
        document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        btn.classList.add('active');
    }

    function switchActiveMeterUI(id) {
        activeMeterId = id;
        document.querySelectorAll('.meter-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`meterTab_${id}`).classList.add('active');
        
        const m = meters[activeMeterId];
        
        document.getElementById('tripType').value = m.tripType;
        document.getElementById('kmPriceInput').value = m.kmPrice;
        document.getElementById('waitPriceInput').value = m.waitPrice;
        document.getElementById('durationPriceInput').value = m.durationPrice;
        
        onTripTypeChanged();
        renderMeterDataToUI();
        redrawActiveRouteLine(); 
    }

    function onTripTypeChanged() {
        const type = document.getElementById('tripType').value;
        document.getElementById('kmPriceGroup').style.display = (type === 'makhsoos') ? 'flex' : 'none';
        
        // تحديث نص الزر الديناميكي وشكله بناءً على نوع الرحلة المختار
        const btnBtn = document.getElementById('dynamicActionBtn');
        if (type === 'afrad') {
            btnBtn.innerText = "👤 تحديث عدد الركاب الحاليين";
            btnBtn.style.backgroundColor = "var(--warning)";
        } else {
            btnBtn.innerText = "👥 تحويل المشوار لأفراد (مشترك)";
            btnBtn.style.backgroundColor = "#818cf8";
        }

        if(!meters[activeMeterId].isActive) {
            meters[activeMeterId].tripType = type;
            saveDataToStorage();
        }
    }

    function updateDotsUI() {
        document.getElementById('dot_1').className = 'meter-status-dot ' + (meters[1].isActive ? 'active' : '');
        document.getElementById('dot_2').className = 'meter-status-dot ' + (meters[2].isActive ? 'active' : '');
    }

    // زر معالجة الإجراءات الديناميكي بناءً على وضع الرحلة الحالية
    function handleDynamicActionButton() {
        const m = meters[activeMeterId];
        if(!m.isActive) return;

        if (m.tripType === 'afrad') {
            // منطق الأفراد: تعديل وتحديث معداد الأفراد والكراسي
            const count = prompt(`المشوار الحالي أفراد (سعر الكرسي الثابت 5ج).\nأدخل إجمالي عدد الركاب المتواجدين بالمركبة حالياً:`, m.passengerCount);
            if (count !== null) {
                const parsedCount = parseInt(count);
                if (parsedCount >= 1 && parsedCount <= 20) {
                    m.passengerCount = parsedCount;
                    showToast(`📊 تم تحديث عدد الركاب إلى: ${m.passengerCount} ركاب`);
                } else {
                    showToast("❌ يرجى إدخال عدد ركاب صحيح");
                }
            }
        } else {
            // منطق المخصوص: ركوب ركاب آخرين وتخفيض السعر الأساسي للمخصوص الأول
            if (confirm("هل تريد تحويل هذا المشوار المخصوص إلى مشترك (أفراد) لركوب زبائن آخرين بالדרך؟")) {
                const newPrice = prompt("أدخل سعر الكيلومتر الجديد المخفض للزبون المخصوص الأول (جنيه/كم):", m.kmPrice);
                if (newPrice !== null) {
                    m.kmPrice = parseFloat(newPrice) || m.kmPrice;
                    m.tripType = 'afrad'; // تحويل النمط الكلي لأفراد لتمكين إضافة ركاب لاحقاً
                    m.passengerCount = 1; // ضبط العداد المبدئي
                    document.getElementById('tripType').value = 'afrad';
                    onTripTypeChanged();
                    showToast(`🔄 تم تحويل المشوار وتعديل تسعيرة المخصوص إلى ${m.kmPrice} ج/كم`);
                }
            }
        }
        calculateFare(m);
        renderMeterDataToUI();
        saveDataToStorage();
    }

    setInterval(() => {
        let updated = false;
        for (let id in meters) {
            let m = meters[id];
            if (m.isActive && m.startTime) {
                m.totalDurationMinutes = (Date.now() - m.startTime) / 1000 / 60;
                
                if (m.isWaitingMode) {
                    m.totalWaitSeconds += 1;
                } else if (m.lastLocationTime && (Date.now() - m.lastLocationTime > 5000)) {
                    m.totalWaitSeconds += 1;
                    m.isWaitingMode = true;
                }
                
                calculateFare(m);
                updated = true;
            }
        }
        if (updated) {
            renderMeterDataToUI();
            saveDataToStorage();
        }
    }, 1000);

    function initGlobalGPS() {
        if (navigator.geolocation) {
            globalWatchId = navigator.geolocation.watchPosition(handleGlobalLocation, handleGPSError, {
                enableHighAccuracy: true, maximumAge: 0, timeout: 10000
            });
        } else {
            showToast("متصفحك لا يدعم نظام الـ GPS");
        }
    }

    function handleGlobalLocation(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const speedKmh = pos.coords.speed ? (pos.coords.speed * 3.6) : null; 
        const currentLatLng = L.latLng(lat, lng);

        if(map) {
            currentMarker.setLatLng(currentLatLng);
            if (meters[activeMeterId].isActive) {
                map.setView(currentLatLng, 16);
            }
        }

        for (let id in meters) {
            let m = meters[id];
            if (!m.isActive) continue;

            const now = Date.now();

            if (m.lastLat && m.lastLng) {
                const lastLatLng = L.latLng(m.lastLat, m.lastLng);
                const distanceKm = lastLatLng.distanceTo(currentLatLng) / 1000;

                if (distanceKm >= GPS_FILTER.minDistance) {
                    const timeElapsedHours = (now - m.lastLocationTime) / 1000 / 3600;
                    const calculatedSpeed = distanceKm / timeElapsedHours;
                    const finalSpeed = speedKmh !== null ? speedKmh : calculatedSpeed;

                    if (finalSpeed > GPS_FILTER.waitingSpeedKmh) {
                        m.totalDistance += distanceKm;
                        m.isWaitingMode = false;
                        m.pathCoords.push({lat: lat, lng: lng});
                    } else {
                        m.isWaitingMode = true;
                    }

                    m.lastLat = lat; m.lastLng = lng; m.lastLocationTime = now;
                } else {
                    const timeDiff = (now - m.lastLocationTime) / 1000;
                    if(timeDiff > 4 && (speedKmh === null || speedKmh < GPS_FILTER.waitingSpeedKmh)) {
                        m.isWaitingMode = true;
                    }
                }
            } else {
                m.lastLat = lat; m.lastLng = lng; m.lastLocationTime = now;
                m.isWaitingMode = false;
                m.pathCoords.push({lat: lat, lng: lng});
            }

            calculateFare(m);
        }

        redrawActiveRouteLine();
        renderMeterDataToUI();
        saveDataToStorage();
    }

    function redrawActiveRouteLine() {
        if (!pathLine || !map) return;
        const m = meters[activeMeterId];
        if (m.pathCoords && m.pathCoords.length > 0) {
            const leafletLatLngs = m.pathCoords.map(coord => L.latLng(coord.lat, coord.lng));
            pathLine.setLatLngs(leafletLatLngs);
            if(m.isActive && leafletLatLngs.length > 1) {
                map.fitBounds(pathLine.getBounds(), { padding: [30, 30] });
            }
        } else {
            pathLine.setLatLngs([]);
        }
    }

    // الحسابات الرياضية المحدثة المبنية على نوع المدخلات الفعلي وركاب التشارك
    function calculateFare(m) {
        let baseFare = m.bandira;
        let distanceCost = 0;
        
        if (m.tripType === 'makhsoos') {
            distanceCost = m.totalDistance * m.kmPrice;
        } else {
            // نمط الأفراد: حساب تراكمي مبني على المسافة المقطوعة مضروبة في (5 جنيه ثابتة لكل كرسي × عدد الركاب الفعليين بالسيارة)
            distanceCost = m.totalDistance * 5 * m.passengerCount; 
        }

        let totalDurationCost = m.totalDurationMinutes * m.durationPrice;
        let waitingMinutes = m.totalWaitSeconds / 60;
        let waitingCost = waitingMinutes * m.waitPrice;

        let total = baseFare + distanceCost + totalDurationCost + waitingCost;

        if (m.tripType === 'makhsoos' && total < m.minFare) {
            total = m.minFare;
        }

        m.finalFare = total;
    }

    function renderMeterDataToUI() {
        const m = meters[activeMeterId];
        
        document.getElementById('totalFareDisplay').innerText = m.finalFare.toFixed(2) + " ج";
        document.getElementById('distDisplay').innerText = m.totalDistance.toFixed(2);
        document.getElementById('durationDisplay').innerText = m.totalDurationMinutes.toFixed(0);
        document.getElementById('waitDisplay').innerText = (m.totalWaitSeconds / 60).toFixed(0);
        
        document.getElementById('currentTypeDisplay').innerText = m.tripType === 'makhsoos' ? 'مخصوص' : 'أفراد مشترك';
        document.getElementById('passengersBadge').innerText = `👥 ركاب: ${m.passengerCount}`;
        document.getElementById('waitingBadge').style.display = m.isWaitingMode ? 'inline-block' : 'none';

        if (m.isActive) {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('dynamicActionBtn').disabled = false; // تفعيل زر الإجراءات التفاعلي أثناء الرحلة
            document.getElementById('globalStatusText').innerText = `عداد رقم [${m.id}] شغال حالياً | كود: ${m.shareCode}`;
        } else {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('dynamicActionBtn').disabled = true;
            document.getElementById('globalStatusText').innerText = `عداد رقم [${m.id}] جاهز وجاهز للبدء`;
        }
    }

    function startCurrentMeter() {
        const m = meters[activeMeterId];
        if (m.isActive) return;

        m.isActive = true;
        m.startTime = Date.now();
        m.tripType = document.getElementById('tripType').value;
        m.kmPrice = parseFloat(document.getElementById('kmPriceInput').value) || 5;
        m.waitPrice = parseFloat(document.getElementById('waitPriceInput').value) || 1;
        m.durationPrice = parseFloat(document.getElementById('durationPriceInput').value) || 0.50;
        m.shareCode = Math.floor(100000 + Math.random() * 900000).toString();
        
        m.totalDistance = 0;
        m.totalWaitSeconds = 0;
        m.passengerCount = 1; // يرتد لـ 1 تلقائياً عند بدء كل رحلة جديدة
        m.lastLat = null; m.lastLng = null; m.lastLocationTime = null;
        m.pathCoords = []; 

        showToast(`تم تشغيل عداد رقم ${m.id} بنجاح`);
        updateDotsUI();
        renderMeterDataToUI();
        redrawActiveRouteLine();
        saveDataToStorage();
    }

    function stopCurrentMeter() {
        const m = meters[activeMeterId];
        if (!m.isActive) return;

        m.isActive = false;
        calculateFare(m);
        saveTripToHistory(m);
        generateReceipt(m);

        meters[activeMeterId] = createEmptyMeterObject(activeMeterId);

        updateDotsUI();
        renderMeterDataToUI();
        redrawActiveRouteLine();
        saveDataToStorage();
    }

    function resetCurrentMeterData() {
        if(confirm("هل أنت متأكد من تصفير العداد بالكامل؟")) {
            meters[activeMeterId] = createEmptyMeterObject(activeMeterId);
            updateDotsUI();
            renderMeterDataToUI();
            redrawActiveRouteLine();
            saveDataToStorage();
            showToast("تم تصفير العداد بنجاح");
        }
    }

    function triggerManualDistance() {
        const m = meters[activeMeterId];
        const manual = prompt("إشارة الـ GPS ضعيفة، أدخل المسافة المقطوعة يدوياً (بالكيلومتر):", m.totalDistance.toFixed(2));
        if (manual !== null) {
            m.totalDistance = parseFloat(manual) || 0;
            calculateFare(m);
            renderMeterDataToUI();
            saveDataToStorage();
            showToast("تم تحديث المسافة المسجلة يدوياً");
        }
    }

    function generateReceipt(m) {
        const body = document.getElementById('receiptBody');
        const waitingMinutes = m.totalWaitSeconds / 60;
        const distCost = m.tripType === 'makhsoos' ? (m.totalDistance * m.kmPrice) : (m.totalDistance * 5 * m.passengerCount);
        const totalDurationCost = m.totalDurationMinutes * m.durationPrice;
        const waitCost = waitingMinutes * m.waitPrice;

        body.innerHTML = `
            <div class="receipt-line"><span class="label">رقم العداد</span><span class="value">${m.id}</span></div>
            <div class="receipt-line"><span class="label">كود المشاركة</span><span class="value">${m.shareCode}</span></div>
            <div class="receipt-line"><span class="label">نوع المشوار النهائي</span><span class="value">${m.tripType === 'makhsoos' ? 'مخصوص' : 'أفراد'}</span></div>
            <div class="receipt-line"><span class="label">إجمالي ركاب المشترك</span><span class="value">${m.passengerCount} ركاب</span></div>
            <div class="receipt-divider"></div>
            <div class="receipt-line"><span class="label">فتحة العداد الثابتة</span><span class="value">${m.bandira.toFixed(2)} ج</span></div>
            <div class="receipt-line"><span class="label">حساب المسافة الكلي</span><span class="value">${distCost.toFixed(2)} ج</span></div>
            <div class="receipt-line"><span class="label">زمن الرحلة الكلي (${m.totalDurationMinutes.toFixed(0)} د)</span><span class="value">${totalDurationCost.toFixed(2)} ج</span></div>
            <div class="receipt-line"><span class="label">حساب الانتظار والتوقف</span><span class="value">${waitCost.toFixed(2)} ج</span></div>
            <div class="receipt-divider"></div>
            <div class="receipt-line receipt-total"><span>إجمالي الأجرة المستحقة</span><span>${m.finalFare.toFixed(2)} ج</span></div>
        `;
        document.getElementById('receiptModal').style.display = 'flex';
    }

    function shareWhatsApp() {
        const text = `🚖 فاتورة رحلة من تطبيق "توقع أجرتك"\nالإجمالي المطلوب: ${document.getElementById('totalFareDisplay').innerText}\nشكراً لاستخدامك العداد الذكي المطور!`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    function closeReceipt() {
        document.getElementById('receiptModal').style.display = 'none';
    }

    function saveDataToStorage() {
        localStorage.setItem('smart_meter_data', JSON.stringify(meters));
    }

    function loadDataFromStorage() {
        const saved = localStorage.getItem('smart_meter_data');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                for(let id in parsed) { meters[id] = parsed[id]; }
            } catch(e) { console.error(e); }
        }
    }

    function saveTripToHistory(m) {
        let history = JSON.parse(localStorage.getItem('smart_meter_history')) || [];
        const tripRecord = {
            id: m.shareCode || Math.floor(100000 + Math.random() * 900000).toString(),
            meterId: m.id,
            date: new Date().toLocaleString('ar-EG'),
            tripType: m.tripType,
            distance: m.totalDistance,
            duration: m.totalDurationMinutes,
            wait: m.totalWaitSeconds / 60,
            fare: m.finalFare,
            savedPath: m.pathCoords 
        };
        history.unshift(tripRecord);
        localStorage.setItem('smart_meter_history', JSON.stringify(history));
    }

    function renderHistory() {
        const historyList = document.getElementById('historyList');
        const history = JSON.parse(localStorage.getItem('smart_meter_history')) || [];

        if (history.length === 0) {
            historyList.innerHTML = `<div class="empty-state">لا يوجد رحلات مسجلة في السجل حتى الآن.</div>`;
            return;
        }

        historyList.innerHTML = history.map(item => `
            <div class="history-item">
                <div class="history-header">
                    <span>🗓️ ${item.date}</span>
                    <span style="color: var(--primary)">كود: ${item.id}</span>
                </div>
                <div class="history-details">
                    <div>العداد المستخدم: عداد ${item.meterId}</div>
                    <div>نوع الرحلة: ${item.tripType === 'makhsoos' ? 'مخصوص' : 'أفراد'}</div>
                    <div>المسافة المقطوعة: ${item.distance.toFixed(2)} كم</div>
                    <div>مدة المشوار الكلية: ${item.duration.toFixed(0)} دقيقة</div>
                    <div>زمن الانتظار: ${item.wait.toFixed(0)} دقيقة</div>
                </div>
                <div class="history-fare" style="text-align: left; margin-top: 5px;">
                     الإجمالي: ${item.fare.toFixed(2)} ج
                </div>
            </div>
        `).join('');
    }

    function clearAllHistory() {
        if (confirm("هل أنت متأكد من رغبتك في حذف سجل الفواتير بالكامل؟")) {
            localStorage.removeItem('smart_meter_history');
            renderHistory();
            showToast("تم مسح السجل بالكامل بنجاح");
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function handleGPSError(err) { console.warn("إشارة الـ GPS غير مستقرة: " + err.message); }
</script>
</body>
</html>
