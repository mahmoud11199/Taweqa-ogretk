name: taweqa_ogretk
description: توقع أجرتك - تطبيق التوك توك الذكي لحساب الأجرة والتتبع
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Supabase
  supabase_flutter: ^2.5.3

  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Networking
  http: ^1.2.1

  # Storage & Local
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.0.7
  url_launcher: ^6.2.5
  share_plus: ^7.2.2
  vibration: ^1.9.0
  qr_flutter: ^4.1.0

  # Web specific
  universal_html: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Variable.ttf
