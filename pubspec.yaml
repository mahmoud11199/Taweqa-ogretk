name: taweqa_ogretk
description: توقع أجرتك - تطبيق التوك توك الذكي لحساب الأجرة والتتبع
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5

  # Supabase
  supabase_flutter: ^2.5.3

  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0

  # Networking
  http: ^1.2.1

  # Storage & Local
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  url_launcher: ^6.2.5
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^22.1.0
  sqflite: ^2.4.2+1
  connectivity_plus: ^7.3.0
  path_provider: ^2.1.6
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Variable.ttf
