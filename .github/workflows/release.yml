name: Build & Release

on:
  push:
    branches: [main]

# أذونات صريحة للسماح بالكتابة والنشر على GitHub Pages + Releases
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supabase-deploy:
    name: Deploy Supabase (DB + Edge Functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Run DB migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Edge Function secrets
        if: env.PAYMOB_API_KEY != ''
        run: |
          supabase secrets set PAYMOB_API_KEY=${{ secrets.PAYMOB_API_KEY }}
          supabase secrets set PAYMOB_INTEGRATION_ID=${{ secrets.PAYMOB_INTEGRATION_ID }}
          supabase secrets set PAYMOB_IFRAME_ID=${{ secrets.PAYMOB_IFRAME_ID }}
        env:
          PAYMOB_API_KEY: ${{ secrets.PAYMOB_API_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.x

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            flutter-pub-

      - name: Generate secrets.dart
        run: |
          cat > lib/core/config/secrets.dart << EOF
          class Secrets {
            static const String paymobApiKey = '${{ secrets.PAYMOB_API_KEY }}';
            static const String paymobIntegrationId = '${{ secrets.PAYMOB_INTEGRATION_ID }}';
            static const String paymobIframeId = '${{ secrets.PAYMOB_IFRAME_ID }}';
            static const String supabaseUrl = '';
            static const String supabaseAnonKey = '';
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build APKs (split per ABI)
        run: >
          flutter build apk --split-per-abi --release
          --dart-define=PAYMOB_API_KEY=${{ secrets.PAYMOB_API_KEY }}
          --dart-define=PAYMOB_INTEGRATION_ID=${{ secrets.PAYMOB_INTEGRATION_ID }}
          --dart-define=PAYMOB_IFRAME_ID=${{ secrets.PAYMOB_IFRAME_ID }}

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.x

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            flutter-pub-

      - name: Generate secrets.dart
        run: |
          cat > lib/core/config/secrets.dart << EOF
          class Secrets {
            static const String paymobApiKey = '${{ secrets.PAYMOB_API_KEY }}';
            static const String paymobIntegrationId = '${{ secrets.PAYMOB_INTEGRATION_ID }}';
            static const String paymobIframeId = '${{ secrets.PAYMOB_IFRAME_ID }}';
            static const String supabaseUrl = '';
            static const String supabaseAnonKey = '';
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS Release
        run: >
          flutter build ios --release --no-codesign
          --dart-define=PAYMOB_API_KEY=${{ secrets.PAYMOB_API_KEY }}
          --dart-define=PAYMOB_INTEGRATION_ID=${{ secrets.PAYMOB_INTEGRATION_ID }}
          --dart-define=PAYMOB_IFRAME_ID=${{ secrets.PAYMOB_IFRAME_ID }}

      - name: Create IPA
        run: |
          mkdir -p build/ios/iphoneos/Runner/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Runner/Payload/
          cd build/ios/iphoneos/Runner
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/Runner/app.ipa

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.x

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            flutter-pub-

      - name: Generate secrets.dart
        run: |
          cat > lib/core/config/secrets.dart << EOF
          class Secrets {
            static const String paymobApiKey = '${{ secrets.PAYMOB_API_KEY }}';
            static const String paymobIntegrationId = '${{ secrets.PAYMOB_INTEGRATION_ID }}';
            static const String paymobIframeId = '${{ secrets.PAYMOB_IFRAME_ID }}';
            static const String supabaseUrl = '';
            static const String supabaseAnonKey = '';
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: >
          flutter build web --release
          --dart-define=PAYMOB_API_KEY=${{ secrets.PAYMOB_API_KEY }}
          --dart-define=PAYMOB_INTEGRATION_ID=${{ secrets.PAYMOB_INTEGRATION_ID }}
          --dart-define=PAYMOB_IFRAME_ID=${{ secrets.PAYMOB_IFRAME_ID }}

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  deploy-github-pages:
    name: Deploy to GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate release tag
        id: tag
        run: |
          echo "version=v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Release ${{ steps.tag.outputs.version }}
          body: |
            ## توقع أجرتك - الإصدار ${{ steps.tag.outputs.version }}
            - Build date: $(date +'%Y-%m-%d')
            - Commit: ${{ github.sha }}
          files: |
            artifacts/android-apks/app-arm64-v8a-release.apk
            artifacts/android-apks/app-armeabi-v7a-release.apk
            artifacts/android-apks/app-x86_64-release.apk
            artifacts/ios-ipa/app.ipa
          generate_release_notes: false
